name: spectaacademy
description: "A new Flutter project for Specta Academy."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Design ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0
  cached_network_image: ^3.4.1

  # --- Networking & API ---
  http: ^1.1.0  
  dio: ^5.4.1
  
  # --- State Management & Storage ---
  provider: ^6.1.2
  shared_preferences: ^2.2.2

  # --- File Handling & PDF (✨ Untuk Question Bank Hub) ---
  file_picker: ^8.0.0+1
  url_launcher: ^6.2.5
  path_provider: ^2.1.1
  pdfrx: ^1.0.67 # PDF Viewer yang ringan dan stabil
  
  # --- Media & Camera ---
  image_picker: ^1.2.1

  # --- Data Visualization (✨ Untuk Grafik Laporan Belajar) ---
  fl_chart: 0.68.0 

  # --- Utils ---
  intl: ^0.19.0 # Untuk format tanggal & mata uang Rupiah
  table_calendar: ^3.1.0 # Untuk fitur jadwal/kalender

  # --- Payment Gateway (✨ Hardlocked untuk Midtrans) ---
  # Kunci di versi 1.1.0 agar UI Kit Midtrans tidak error/pecah
  midtrans_sdk: 1.1.0             

  # --- WebView ---
  webview_flutter: ^4.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 

flutter:
  uses-material-design: true

  # --- Assets Configuration ---
  assets:
    - assets/images/abdi_negara.png
    - assets/images/ptn_unhan.png
    - assets/images/favorit.png
    - assets/images/reguler.png
    - assets/images/logo.png
    # Tambahkan folder assets lainnya jika ada, misal:
    # - assets/icons/