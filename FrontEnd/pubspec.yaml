  file_picker: ^8.0.0+1
  google_fonts: ^6.2.1
  provider: ^6.1.2
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Gunakan versi 3.0.0 yang umum
  fl_chart: ^0.66.0

flutter:
