name: spectaacademy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0 # Diturunkan ke 3.0.0 agar lebih kompatibel luas

dependencies:
  webview_flutter: ^4.0.7
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0  


  syncfusion_flutter_pdfviewer: ^25.1.37  # ✨ Gunakan versi terbaru ini
 
  
  # Kunci di versi 1.1.0 (Tanpa tanda ^) agar startPaymentUi berfungsi kembali
