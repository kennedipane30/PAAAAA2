# 1. Alokasi Memori (Ditingkatkan ke 4GB jika RAM laptop Anda cukup)
org.gradle.jvmargs=-Xmx4096M -XX:MaxMetaspaceSize=1024M -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# 2. Fitur Kecepatan (WAJIB ADA)
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# 3. AndroidX Support
android.useAndroidX=true
android.enableJetifier=true

# 4. Optimasi Kotlin (UBAH KE TRUE agar tidak re-build dari awal setiap saat)
kotlin.incremental=true
kotlin.code.style=official

# Tambahkan ini untuk mencegah error build pada beberapa library
android.suppressUnsupportedCompileSdk=36