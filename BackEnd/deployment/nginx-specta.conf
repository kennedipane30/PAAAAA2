server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # ============================================================
    # 1. PRIORITAS UTAMA: REVERSE PROXY MICROSERVICES GOLANG
    # ============================================================

    # Mencocokkan rute /api/tryouts secara mutlak menggunakan REGEX
    location ~ ^/api/tryouts {
        proxy_pass http://127.0.0.1:9002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Mencocokkan rute /api/materials secara mutlak menggunakan REGEX
    location ~ ^/api/materials {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Mencocokkan rute /api/practices secara mutlak menggunakan REGEX
    location ~ ^/api/practices {
        proxy_pass http://127.0.0.1:9003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============================================================
    # 2. FALLBACK GATEWAY: LARAVEL BACKEND
    # ============================================================
    location /api {
        proxy_pass http://127.0.0.1:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /storage {
        proxy_pass http://127.0.0.1:8000/storage;
        proxy_set_header Host $host;
    }

    location / {
        root /var/www/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}
