server {
    listen 80;
    listen [::]:80;

    server_name 3.107.184.92; # Alamat IP AWS EC2 Anda

    # ============================================================
    # 1. GATEWAY UTAMA: LARAVEL BACKEND (PORT 8000)
    # ============================================================
    location /api {
        proxy_pass http://127.0.0.1:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage {
        proxy_pass http://127.0.0.1:8000/storage;
        proxy_set_header Host $host;
    }

    # ============================================================
    # 2. ROUTING MICROSERVICES GOLANG (PORT INTERNAL)
    # ============================================================

    # Jalur Khusus Materi (Sesuai dengan Router Go Materi Anda)
    location /api/materials {
        proxy_pass http://127.0.0.1:9001/api/materials;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Jalur Khusus Tryout (Sesuai dengan Group /api di main.go Anda)
    location /api/tryouts {
        proxy_pass http://127.0.0.1:9002/api/tryouts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Jalur Khusus Latihan Soal/Practice
    location /api/practices {
        proxy_pass http://127.0.0.1:9003/api/practices;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}