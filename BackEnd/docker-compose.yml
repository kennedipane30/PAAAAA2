version: '3.8'

services:
  # 1. Service Laravel (PHP)
  app:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: specta_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./BackEnd:/var/www
    networks:
      - specta_network

  # 2. Service Nginx (Web Server) agar bisa dibuka di Chrome
  webserver:
    image: nginx:alpine
    container_name: specta_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./BackEnd:/var/www
      - ./BackEnd/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - specta_network

  # 3. Service Database (PostgreSQL) - MODIFIKASI DISINI
  db:
    image: postgres:15-alpine
    container_name: specta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: specta_academy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: if324003
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - specta_network

networks:
  specta_network:
    driver: bridge

volumes:
  dbdata:
